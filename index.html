<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mythical</title>
<style>
  :root { color-scheme: light dark; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.6;
    color: #222;
    background: #fafafa;
    max-width: 640px;
    margin: 64px auto;
    padding: 0 24px;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #f0f0f0; background: #111; }
    a { color: #6ab0ff; }
  }
  h1 { font-size: 36px; margin: 0 0 16px; letter-spacing: -0.5px; }
  p { margin: 0 0 16px; }
  .lede { color: #666; font-size: 17px; }
  @media (prefers-color-scheme: dark) {
    .lede { color: #999; }
  }
  ul { list-style: none; padding: 0; margin: 32px 0 0; }
  li { margin: 8px 0; }
  a {
    color: #0066cc;
    text-decoration: none;
    border-bottom: 1px solid currentColor;
    padding-bottom: 1px;
  }
  a:hover { opacity: 0.7; }
  footer {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid rgba(128,128,128,0.2);
    color: #888;
    font-size: 14px;
  }
</style>
</head>
<body>
  <h1>Mythical</h1>
  <p class="lede">A minimalist iOS calorie tracker. Photos stay local. No analytics. Free.</p>
  <ul>
    <li><a href="./privacy">Privacy Policy</a></li>
  </ul>
  <footer>
    Contact: <a href="mailto:falachvasyl@gmail.com">falachvasyl@gmail.com</a>
  </footer>
</body>
</html>
